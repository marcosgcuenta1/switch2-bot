name: Cazaofertas Switch 2

on:
  schedule:
    # Cada 30 minutos (hora UTC). GitHub puede retrasar los cron bajo carga.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestana Actions

# Necesario para que el bot pueda commitear state.json de vuelta al repo
permissions:
  contents: write

# Evita que dos ejecuciones se pisen al guardar el estado
concurrency:
  group: cazaofertas
  cancel-in-progress: false

jobs:
  check:
    # 22.04 a proposito: Playwright 1.44 (fijado por el Python 3.9 local) no
    # conoce el paquete renombrado libasound2t64 de Ubuntu 24.04, asi que
    # "playwright install --with-deps" falla en ubuntu-latest.
    runs-on: ubuntu-22.04
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cachear pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Ejecutar bot (una pasada)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --once

      - name: Guardar estado (state.json)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el estado."
          else
            git commit -m "Actualiza estado [skip ci]"
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
            git push
          fi
