# --- Configuracion del bot cazaofertas Nintendo Switch 2 ---

# Termino de busqueda que se lanza en cada web
search_query: "nintendo switch 2"

# Cada cuanto revisa (en minutos)
poll_interval_minutes: 30

# --- Que se considera "oferta" ---
# UNICA condicion: avisa solo si la consola baja de este precio.
target_price: 400
# Aviso por caida porcentual DESACTIVADO (null): solo queremos avisos < 400 EUR.
# Si algun dia quieres reactivarlo, pon un numero (p.ej. 8).
drop_percent: null

# Suelo de precio: ignora cualquier resultado por debajo de esto. La consola
# Switch 2 ronda los 430-600 EUR, asi que esto descarta juegos y accesorios
# (que tambien contienen "switch 2" en el titulo) de un plumazo.
ignore_below_price: 350

# Suelo propio por web. En segunda mano (Wallapop/Milanuncios) una consola usada
# puede costar 300-380 EUR legitimamente, asi que bajamos el suelo a 250 para no
# perderlas (por debajo de 250 casi siempre es accesorio, caja vacia o estafa).
ignore_below_price_by_site:
  wallapop: 250
  milanuncios: 250

# Filtro de titulo: el producto debe contener TODAS estas cadenas (en minusculas).
# Usamos la frase "switch 2" entera para no confundir con la Switch 1 ni casar
# el "2" dentro de "32gb" y similares.
title_must_contain:
  - "switch 2"

# Palabras que descartan el resultado (fundas, protectores, etc.). Opcional.
title_must_not_contain:
  - "funda"
  - "carcasa"
  - "protector"
  - "cargador"
  - "mando"

# Webs activas
sites:
  amazon: true
  mediamarkt: true
  aliexpress: true
  chollometro: true
  wallapop: true       # segunda mano (solo funciona en local; la nube la bloquea)
  milanuncios: true    # segunda mano; DataDome la bloquea a menudo (best-effort)

# --- Capa de IA (opcional) ---
# Si defines GEMINI_API_KEY en el entorno, la IA descarta lo que NO es una
# consola Switch 2 de verdad (accesorios, fundas, juegos, reservas, packs raros
# que el filtro de keywords deja pasar) y anota una puntuacion de oferta 0-100.
# Sin la clave, el bot funciona igual que antes (solo keywords). Es 100% gratis:
# Gemini Flash da 1500 peticiones/dia en su tier libre.
ai:
  enabled: true            # ponlo en false para apagar la IA aunque haya clave
  model: ""                # "" = empezar por el primero de la cadena de fallback
  batch_size: 5            # productos por llamada (no lo subas mucho: tier gratis)
  rate_limit_seconds: 7    # segundos minimos entre llamadas a la API

# --- Codigos de cupon de plataforma ---
# Codigos que se TECLEAN en el pago y NO estan en el precio mostrado (a diferencia
# de los descuentos automaticos de AliExpress, que ya van incluidos). El bot aplica
# el mejor codigo aplicable (segun compra minima) al precio efectivo y lo marca.
# Caducan: ACTUALIZALOS a mano cuando salgan nuevos (los viejos se ignoran solos
# al pasar su fecha 'caduca'). Fuentes: chollometro.com/cupones, cupones.es, etc.
codigos_plataforma:
  aliexpress:
    - codigo: "BDES40"
      descuento: 40         # € de descuento
      mineur: 329           # compra minima en €
      caduca: "2026-06-26"
      nota: "Dia de marcas, solo envios a Espana"
    - codigo: "BDES25"
      descuento: 25
      mineur: 209
      caduca: "2026-06-26"
      nota: "Dia de marcas"
    - codigo: "BDES12"
      descuento: 12
      mineur: 109
      caduca: "2026-06-26"
      nota: "Dia de marcas"
